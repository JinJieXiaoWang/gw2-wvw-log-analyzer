[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312', 'py313']

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3

[tool.pylint.messages_control]
disable = [
    "C0114",  # missing-module-docstring (我们有文件头部注释)
    "C0115",  # missing-class-docstring
    "C0116",  # missing-function-docstring
    "W0511",  # TODO警告
    "R0913",  # too-many-arguments
    "R0914",  # too-many-locals
    "R0915",  # too-many-statements
]

[tool.pylint.format]
max-line-length = 88

[tool.pylint.design]
max-args = 10
max-locals = 30
max-statements = 50
