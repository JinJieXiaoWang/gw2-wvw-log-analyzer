# =============================================================================
# GW2 WvW 日志系统 — Docker Compose 生产编排
# 域名: gw2-log-analyzer.top
# 更新日期: 2026-05-05
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI 后端服务
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gw2-backend
    restart: unless-stopped
    environment:
      # 数据库配置（使用容器内 db 服务）
      DB_TYPE: mysql
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: gw2
      MYSQL_USER: gw2
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gw2_pass_2026}

      # 应用安全配置（生产环境必须在 .env 中设置强密钥）
      SECRET_KEY: ${SECRET_KEY:?错误：必须在 .env 中设置 SECRET_KEY，至少32位随机字符串}
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTO_INIT_DB: "true"

      # 管理员配置
      # 生产环境必须设置强密码，部署后会同步到数据库
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?错误：必须在 .env 中设置 ADMIN_INITIAL_PASSWORD}
      ADMIN_PASSWORD_SYNC: "true"

      # CORS 配置（自动包含域名）
      BACKEND_CORS_ORIGINS: '["https://gw2-log-analyzer.top","http://gw2-log-analyzer.top","https://www.gw2-log-analyzer.top","http://www.gw2-log-analyzer.top"]'

      # Uvicorn 配置
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}

      # 文件上传配置
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: 104857600

      # 存储管理
      FILE_RETENTION_DAYS: 30
      AUTO_CLEANUP_ENABLED: "true"

    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
      - app_database:/app/database
    ports:
      # 生产环境不直接暴露 8000，仅通过 nginx 访问
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gw2-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MySQL 8.0 数据库
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: gw2-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_2026}
      MYSQL_DATABASE: gw2
      MYSQL_USER: gw2
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gw2_pass_2026}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/migrations:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone=+08:00
      --max_connections=200
      --innodb_buffer_pool_size=256M
    networks:
      - gw2-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Nginx 反向代理 + SSL
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: gw2-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./scripts/docker/conf.d:/etc/nginx/conf.d:ro
      - ./dist:/var/www/html:ro
      - app_uploads:/var/www/uploads:ro
      - ./logs/nginx:/var/log/nginx
      # SSL 证书（Let's Encrypt 或自签名证书）
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - gw2-network

  # ---------------------------------------------------------------------------
  # Certbot SSL 自动续期（可选，使用 Let's Encrypt 时启用）
  # ---------------------------------------------------------------------------
  # certbot:
  #   image: certbot/certbot
  #   container_name: gw2-certbot
  #   volumes:
  #     - ./ssl:/etc/letsencrypt
  #     - ./logs/certbot:/var/log/letsencrypt
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
  #   networks:
  #     - gw2-network

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  app_database:
    driver: local

networks:
  gw2-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
