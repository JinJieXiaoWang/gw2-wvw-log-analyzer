# GW2 WvW 日志系统 - Nginx 反向代理配置
# 安装: sudo cp nginx-gw2.conf /etc/nginx/sites-available/gw2-backend
# 启用: sudo ln -s /etc/nginx/sites-available/gw2-backend /etc/nginx/sites-enabled/
# 测试: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;  # 改为你的域名，如 logs.yourdomain.com

    # 客户端最大上传大小 (100MB，匹配 MAX_UPLOAD_SIZE)
    client_max_body_size 100M;

    # 日志
    access_log /var/log/nginx/gw2-backend.access.log;
    error_log /var/log/nginx/gw2-backend.error.log;

    # 健康检查
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 路由
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (如果需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 文档 (Swagger UI / ReDoc)
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # 静态文件 (如果有前端构建产物)
    # location / {
    #     root /opt/gw2-backend/static;
    #     try_files $uri $uri/ /index.html;
    # }
}

