# ============================================================================
# GW2 WvW 日志系统 - 生产环境 Nginx 配置模板
# ============================================================================
# 使用说明：
#   1. 将本文件复制到服务器: /etc/nginx/sites-available/gw2-backend
#   2. 修改 server_name 为你的实际域名
#   3. 如使用 HTTPS，取消注释 SSL 相关配置并放置证书
#   4. 启用站点: ln -sf /etc/nginx/sites-available/gw2-backend /etc/nginx/sites-enabled/
#   5. 测试并重载: nginx -t && systemctl reload nginx
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name gw2-log-analyzer.top www.gw2-log-analyzer.top;

    # 日志配置
    access_log /var/log/nginx/gw2-access.log;
    error_log /var/log/nginx/gw2-error.log warn;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 文件上传限制
    client_max_body_size 100M;
    client_body_buffer_size 16k;
    client_body_timeout 300s;
    proxy_request_buffering off;

    # ------------------------------------------------------------------------
    # 后端 API 路由（必须在前端 location 之前）
    # ------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_request_buffering off;
        proxy_buffering off;

        # CORS 预检支持
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ------------------------------------------------------------------------
    # 上传文件直接访问
    # ------------------------------------------------------------------------
    location /uploads/ {
        alias /opt/gw2-backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # ------------------------------------------------------------------------
    # 前端 SPA 静态文件
    # ------------------------------------------------------------------------
    location / {
        root /opt/gw2-backend/frontend/dist;
        index index.html;
        try_files $uri $uri/ @spa;
    }

    location @spa {
        rewrite ^ /index.html break;
    }

    # 静态资源长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        root /opt/gw2-backend/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

